<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Voice — Plan D</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17; --surface: #111827; --surface2: #1c2538; --surface3: #243050;
    --border: #2a3650; --border2: #3b4f70; --text: #e0e8f5; --text-dim: #8899bb;
    --accent: #3b82f6; --accent2: #2563eb; --accent-glow: rgba(59,130,246,.25);
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --cyan: #22d3ee;
    --radius: 10px; --radius-sm: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .logo-badge { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: .5px; }
  .hdr-right { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; transition: all .3s; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.3); }
  .dot.red { background: var(--red); }

  .mode-bar { display: flex; gap: 4px; padding: 6px 18px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
  .mode-pill { padding: 5px 14px; border-radius: 16px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; font-family: inherit; transition: all .2s; white-space: nowrap; flex-shrink: 0; }
  .mode-pill:hover { background: var(--surface2); color: var(--text); }
  .mode-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .chat-area { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .chat-area:empty::after { content: 'Plan D — Configuración Definitiva. Escribe o usa el micrófono.'; color: var(--text-dim); font-size: 13px; text-align: center; margin-top: 50px; opacity: .5; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.6; animation: fadeIn .25s ease; word-wrap: break-word; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.error { align-self: center; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); color: #fca5a5; font-size: 12px; }
  .msg .tts-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text-dim); margin-top: 4px; padding: 1px 7px; background: rgba(255,255,255,.04); border-radius: 3px; }
  .msg .tts-tag.playing { color: var(--accent); }
  .msg .cached-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; color: var(--green); margin-left: 6px; padding: 1px 5px; background: rgba(34,197,94,.1); border-radius: 3px; }
  .think-dots { align-self: flex-start; display: flex; gap: 3px; padding: 14px 18px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .think-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; }
  .think-dots span:nth-child(2) { animation-delay: .2s; }
  .think-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .input-area { display: flex; gap: 6px; padding: 10px 18px 14px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; align-items: flex-end; }
  .input-area textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 9px 12px; font-size: 13px; font-family: inherit; resize: none;
    outline: none; transition: border-color .2s; min-height: 38px; max-height: 110px;
  }
  .input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .btn {
    width: 38px; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: all .2s; flex-shrink: 0;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent2); }
  .btn.rec { background: var(--red); border-color: var(--red); color: #fff; animation: recPulse 1.5s infinite; }
  @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.35)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
  .btn.tts-on { background: var(--green); border-color: var(--green); color: #000; }
  .stream-cursor::after { content: '▌'; animation: blink .8s infinite; color: var(--accent); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .footer { display: flex; gap: 14px; padding: 5px 18px 8px; font-size: 10px; color: var(--text-dim); flex-shrink: 0; border-top: 1px solid var(--border); background: var(--surface); }
  .footer .v { color: var(--accent); font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <div class="logo"><span class="logo-badge">D</span> Alex Voice <span style="color:var(--text-dim);font-weight:400;font-size:12px">— Definitivo</span></div>
  <div class="hdr-right">
    <span id="hdrStatus">Conectando...</span>
    <span class="dot" id="hdrDot"></span>
  </div>
</header>
<div class="mode-bar">
  <button class="mode-pill" data-mode="teacher">🎓 Teacher</button>
  <button class="mode-pill active" data-mode="conversation">💬 Conversación</button>
  <button class="mode-pill" data-mode="translator">🌍 Traductor</button>
</div>
<div class="chat-area" id="chatArea"></div>
<div class="input-area">
  <button class="btn" id="micBtn" title="Micrófono">🎤</button>
  <textarea id="input" placeholder="Escribe un mensaje..." rows="1"></textarea>
  <button class="btn primary" id="sendBtn" title="Enviar">➤</button>
  <button class="btn tts-on" id="ttsBtn" title="TTS">🔊</button>
</div>
<div class="footer">
  <span>⚡ <span class="v" id="fTok">—</span> tok/s</span>
  <span>🎮 VRAM <span class="v" id="fVram">—</span> GB</span>
  <span>🧠 <span class="v" id="fCtx">—</span> ctx</span>
  <span style="margin-left:auto"><a href="/debug" target="_blank">🐞 Debug</a></span>
</div>

<script>
// ── Reusable AudioContext ────────────────────────────
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── Config ───────────────────────────────────────────
const API = `http://localhost:3003`;
let mode = 'conversation';
let generating = false;
let ac = null;
const CHAT = document.getElementById('chatArea');
const INP = document.getElementById('input');
const SBTN = document.getElementById('sendBtn');
const MBTN = document.getElementById('micBtn');
const TBTN = document.getElementById('ttsBtn');
const STXT = document.getElementById('hdrStatus');
const SDOT = document.getElementById('hdrDot');
let tts = true;
let rec = false;
let recog = null;
const THINK = /<\|im_start\|>think[\s\S]*?<\|im_end\|>/g;
let hist = [];

const SYS = {
  teacher: "Eres un tutor de idiomas paciente y claro. Explicas en el idioma del usuario.\n\nREGLAS:\n- Responde SIEMPRE con este formato exacto:\n  【TEXT】texto en el idioma objetivo\n  【ROMANJI】pronunciación fonética\n  【TRANS】traducción al idioma del usuario\n- El usuario es principiante. Usa vocabulario básico y frases cortas.\n- Después de la traducción, añade 1 ejercicio breve.\n- Ejemplo de respuesta completa:\n  【TEXT】Hello, how are you?\n  【ROMANJI】Jeh-loh, jau ar iu?\n  【TRANS】¡Hola! ¿Cómo estás?\n  💪 Ejercicio: Traduce 'Buenos días' al inglés.\n- Incluye contexto cultural cuando sea relevante.\n- Celebra los progresos con emojis.",
  conversation: "Eres un compañero de conversación natural y auténtico.\n\nPERSONALIDAD:\n- Cálido/a, con humor sutil\n- Usas expresiones coloquiales naturales\n- Tienes opiniones propias (música, comida, viajes, tecnología)\n- A veces cuentas anécdotas breves\n\nREGLAS:\n- NO traduzcas — solo conversa naturalmente\n- Usa el mismo idioma que el usuario\n- Alterna preguntas y opiniones personales\n- Respuestas de 2-4 párrafos, no monólogos\n- Usa emojis con moderación 😊\n- Si el usuario se despide, hazlo con naturalidad",
  translator: "Eres un traductor profesional de precisión absoluta.\n\nREGLAS:\n- Traduce EXACTAMENTE lo que el usuario escribe, ni más ni menos\n- NO añadas explicaciones, notas, ni comentarios\n- Preserva el tono: formal→formal, casual→casual\n- Modismos: tradúcelos al equivalente cultural:\n  ES 'está lloviendo a cántaros' → EN \"it's raining cats and dogs\"\n  EN 'break a leg' → ES '¡mucha mierda!'\n- Preserva formato: listas, código, poemas, fechas\n- Nombres propios: NO los traduzcas\n- Una sola línea de traducción. Sin prefacios. Sin adornos.\n- El usuario escribe en el idioma de entrada. Tú respondes SOLO con la traducción. Si el texto está vacío: '⚠️ Texto no reconocido'"
};

INP.addEventListener('input', () => { INP.style.height = '38px'; INP.style.height = Math.min(INP.scrollHeight, 110) + 'px'; });
INP.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

// ── Push-to-Talk: Space bar ─────────────────────────────
let _pttActive = false;

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT' && !e.repeat) {
    e.preventDefault();
    if (!_pttActive && !generating) {
      _pttActive = true;
      if (recog) {
        rec = true; MBTN.classList.add('rec');
        try { recog.start(); } catch(e) { console.warn(e); }
      }
      STXT.textContent = '🎤 Push-to-Talk';
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === ' ' && _pttActive) {
    e.preventDefault();
    _pttActive = false;
    if (recog) {
      try { recog.stop(); } catch(e) {}
      rec = false; MBTN.classList.remove('rec');
    }
  }
});

// ── Mode switching con reseteo de contexto ────────────────
document.querySelectorAll('.mode-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.mode-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    
    // 🧹 Resetear contexto al cambiar de modo
    mode = p.dataset.mode;
    hist = [];  // limpiar historial
    CHAT.innerHTML = '';  // limpiar chat visual
    fetch(`${API}/api/cache/clear`).catch(() => {});  // limpiar caché servidor
    
    msg(`🔄 Modo: ${p.textContent.trim()} — contexto reiniciado`, 'system', false, false);
    STXT.textContent = '✅ Contexto reiniciado';
  });
});

TBTN.addEventListener('click', () => { tts = !tts; TBTN.classList.toggle('tts-on', tts); });
TBTN.classList.add('tts-on');

function msg(text, type, ttsTag, cached) {
  if (!text) return;
  const d = document.createElement('div'); d.className = `msg ${type}`;
  d.textContent = text;
  if (cached) { const badge = document.createElement('span'); badge.className = 'cached-badge'; badge.textContent = '⚡ Caché'; d.appendChild(badge); }
  if (ttsTag) { const tag = document.createElement('span'); tag.className = 'tts-tag playing'; tag.textContent = ttsTag; d.appendChild(tag); }
  CHAT.appendChild(d); CHAT.scrollTop = CHAT.scrollHeight;
}

function think(on) {
  const el = document.getElementById('thinkInd');
  if (on && !el) {
    const d = document.createElement('div'); d.className = 'think-dots'; d.id = 'thinkInd';
    d.innerHTML = '<span></span><span></span><span></span>'; CHAT.appendChild(d); CHAT.scrollTop = CHAT.scrollHeight;
  }
  if (!on && el) el.remove();
}

async function send() {
  const txt = INP.value.trim();
  if (!txt || generating) return;
  msg(txt, 'user', false, false); INP.value = ''; INP.style.height = '38px';
  generating = true; SBTN.disabled = true; think(true); STXT.textContent = '🧠 Pensando...';

  hist.push({ role: 'user', content: txt });
  const msgs = [{ role: 'system', content: SYS[mode] || SYS.conversation }, ...hist.slice(-20)];
  ac = new AbortController();

  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs, temperature: mode === 'translator' ? 0.3 : mode === 'teacher' ? 0.5 : 0.7, stream: true, n_predict: 1024 }),
      signal: ac.signal,
    });
    if (!r.ok) { const e = await r.json().catch(()=>({error:`HTTP ${r.status}`})); think(false); msg(`❌ ${e.error||'Error'}`, 'error', false, false); generating=false; SBTN.disabled=false; return; }

    think(false);
    const sd = document.createElement('div'); sd.className = 'msg assistant stream-cursor';
    CHAT.appendChild(sd); CHAT.scrollTop = CHAT.scrollHeight;
    const reader = r.body.getReader(); const dec = new TextDecoder();
    let buf = '', full = '', isCached = false;

    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true });
      for (const line of buf.split('\n').slice(0,-1)) {
        buf = buf.split('\n').pop() || '';
        if (line.startsWith('data: ')) {
          const d = line.slice(6).trim();
          if (!d || d === '[DONE]') continue;
          try {
            const j = JSON.parse(d);
            const delta = j.choices?.[0]?.delta?.content || '';
            if (delta) { full += delta; sd.textContent = full.replace(THINK,'').trim() || '⏳'; CHAT.scrollTop = CHAT.scrollHeight; }
            if (j.cached) isCached = true;
          } catch(e) {}
        }
      }
    }

    sd.classList.remove('stream-cursor');
    const final = full.replace(THINK,'').trim() || full;
    sd.textContent = final;
    hist.push({ role: 'assistant', content: final });

    if (isCached) {
      const badge = document.createElement('span'); badge.className = 'cached-badge'; badge.textContent = '⚡ Caché'; sd.appendChild(badge);
      STXT.textContent = '⚡ Desde caché';
    } else {
      STXT.textContent = '✅ Listo';
    }

    if (tts && final && final.length > 3 && final.length < 500) {
      const eng = await playTTS(final, sd);
      if (eng) { const tag = document.createElement('span'); tag.className = 'tts-tag playing'; tag.textContent = eng === 'kokoro' ? '🎵 Kokoro' : '🔊 Piper'; sd.appendChild(tag); }
    }
  } catch(e) {
    think(false);
    if (e.name === 'AbortError') msg('⏹️ Cancelado', 'system', false, false);
    else msg(`❌ ${e.message}`, 'error', false, false);
  }
  generating = false; SBTN.disabled = false;
}

async function playTTS(text, el) {
  try {
    const r = await fetch(`${API}/api/tts/stream`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, lang: 'auto' }),
    });
    if (!r.ok) {
      const r2 = await fetch(`${API}/api/tts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, lang: 'auto' }) });
      if (r2.ok) { const b = await r2.blob(); const u = URL.createObjectURL(b); const a = new Audio(u); a.onended = () => URL.revokeObjectURL(u); await a.play(); }
      return null;
    }
    const sr = parseInt(r.headers.get('X-Sample-Rate') || '24000');
    const eng = r.headers.get('X-TTS-Engine') || 'piper';
    const ctx = getAC();
    const reader = r.body.getReader(); const ch = [];
    while (true) { const { done, value } = await reader.read(); if (done) break; ch.push(value); }
    const total = ch.reduce((s,c)=>s+c.length,0);
    const buf = new Uint8Array(total); let off = 0;
    for (const c of ch) { buf.set(c, off); off += c.length; }
    const i16 = new Int16Array(buf.buffer); const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
    const b = ctx.createBuffer(1, f32.length, sr); b.getChannelData(0).set(f32);
    const src = ctx.createBufferSource(); src.buffer = b; src.connect(ctx.destination); src.start();
    return eng;
  } catch(e) { console.warn('[D] TTS:', e); return null; }
}

// ── ASR ──────────────────────────────────────────────
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR(); recog.continuous = false; recog.interimResults = false; recog.lang = 'es-ES';
  recog.onresult = e => {
    const t = e.results[0][0].transcript; INP.value = t; INP.style.height = '38px';
    INP.style.height = Math.min(INP.scrollHeight, 110) + 'px';
    rec = false; MBTN.classList.remove('rec'); send();
  };
  recog.onerror = e => { rec = false; MBTN.classList.remove('rec'); if (!['aborted','no-speech'].includes(e.error)) msg(`❌ Mic: ${e.error}`, 'error', false, false); };
  recog.onend = () => { rec = false; MBTN.classList.remove('rec'); };
}
MBTN.addEventListener('click', () => {
  if (rec) { if (recog) try{recog.stop()}catch(e){}; rec=false; MBTN.classList.remove('rec'); return; }
  if (recog) { rec=true; MBTN.classList.add('rec'); try{recog.start()}catch(e){console.warn(e)} }
  else msg('❌ Micrófono no soportado', 'error', false, false);
});

// ── Stats ───────────────────────────────────────────
async function poll() {
  try {
    const r = await fetch(`${API}/api/stats`);
    if (!r.ok) throw Error();
    const s = await r.json();
    SDOT.className = 'dot ' + (s.llama_connected ? 'green' : 'red');
    STXT.textContent = s.llama_connected ? `🟢 ${s.tokens_per_sec||'?'} tok/s` : '⚠️ llama-server desconectado';
    document.getElementById('fTok').textContent = s.tokens_per_sec || '—';
    document.getElementById('fVram').textContent = s.vram_used_mb ? (s.vram_used_mb/1024).toFixed(1) : '—';
    document.getElementById('fCtx').textContent = s.context_percent ? Math.round(s.context_percent) + '%' : '—';
    if (!s.llama_connected) SDOT.className = 'dot red';
  } catch(e) { SDOT.className = 'dot red'; STXT.textContent = '⚠️ Servidor no disponible'; }
}
setInterval(poll, 2000); poll();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && generating && ac) { ac.abort(); msg('⏹️ Cancelado', 'system', false, false); generating = false; SBTN.disabled = false; }
});
</script>
</body>
</html>
