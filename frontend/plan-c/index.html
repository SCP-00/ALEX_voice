<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Voice — Plan C</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface-hover: #24243a;
    --border: #2a2a44;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.3);
    --green: #4ade80;
    --green-glow: rgba(74, 222, 128, 0.2);
    --red: #ef4444;
    --yellow: #facc15;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
  }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    transition: all 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
  .status-dot.disconnected { background: var(--red); }
  .status-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Mode pills ── */
  .mode-bar {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mode-pill {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .mode-pill:hover { background: var(--surface-hover); color: var(--text); }
  .mode-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-area:empty::after {
    content: 'Escribe algo o usa el micrófono para empezar...';
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    margin-top: 60px;
    opacity: 0.6;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
    word-wrap: break-word;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    align-self: center;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    font-size: 13px;
  }
  .msg .tts-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    padding: 2px 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .msg .tts-indicator:hover { background: rgba(255,255,255,0.1); }
  .msg .tts-indicator.playing { color: var(--accent); }
  .thinking {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 16px 20px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .thinking span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.4s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

  /* ── Input area ── */
  .input-area {
    display: flex;
    gap: 8px;
    padding: 12px 20px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 42px;
    max-height: 120px;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-dim); }
  .btn {
    width: 42px; height: 42px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-hover);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #6a4ae0; }
  .btn.recording { background: var(--red); border-color: var(--red); color: #fff; animation: recPulse 1.5s infinite; }
  @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
  .btn.tts-active { background: var(--green); border-color: var(--green); color: #000; }

  /* ── Streaming cursor ── */
  .streaming-cursor::after {
    content: '▌';
    animation: blink 0.8s infinite;
    color: var(--accent);
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    header { padding: 10px 14px; }
    .chat-area { padding: 14px; }
    .input-area { padding: 10px 14px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">C</span>
    Alex Voice <span style="color:var(--text-dim);font-weight:400;font-size:13px">— Plan C</span>
  </div>
  <div class="header-status">
    <span id="statusText">Conectando...</span>
    <span class="status-dot" id="statusDot"></span>
  </div>
</header>

<div class="mode-bar">
  <button class="mode-pill active" data-mode="conversation">💬 Conversación</button>
  <button class="mode-pill" data-mode="teacher">🎓 Teacher</button>
  <button class="mode-pill" data-mode="translator">🌍 Traductor</button>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <button class="btn" id="micBtn" title="Micrófono (ASR)">🎤</button>
  <textarea id="input" placeholder="Escribe un mensaje..." rows="1"></textarea>
  <button class="btn primary" id="sendBtn" title="Enviar">➤</button>
  <button class="btn" id="ttsBtn" title="TTS al hablar">🔊</button>
</div>

<script>
// ── Reusable AudioContext ────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── Config ───────────────────────────────────────────
const API = `http://localhost:3002`;
let currentMode = 'conversation';
let isGenerating = false;
let abortController = null;
const chatArea = document.getElementById('chatArea');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const ttsBtn = document.getElementById('ttsBtn');
const statusText = document.getElementById('statusText');
const statusDot = document.getElementById('statusDot');
let ttsEnabled = true;
let isRecording = false;
let recognition = null;
const THINK_REGEX = /<\|im_start\|>think[\s\S]*?<\|im_end\|>/g;
let history = [];

// ── Auto-resize textarea ─────────────────────────────
input.addEventListener('input', () => {
  input.style.height = '42px';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── Mode pills ───────────────────────────────────────
document.querySelectorAll('.mode-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentMode = pill.dataset.mode;
    addMsg(`Modo cambiado a: ${pill.textContent.trim()}`, 'system');
  });
});

// ── TTS toggle ───────────────────────────────────────
ttsBtn.addEventListener('click', () => {
  ttsEnabled = !ttsEnabled;
  ttsBtn.classList.toggle('tts-active', ttsEnabled);
});
ttsBtn.classList.add('tts-active');

// ── Logging helper ───────────────────────────────────
function addMsg(text, type) {
  if (!text) return;
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinkingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById('thinkingIndicator');
  if (el) el.remove();
}

// ── Send message ─────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || isGenerating) return;

  addMsg(text, 'user');
  input.value = '';
  input.style.height = '42px';
  isGenerating = true;
  sendBtn.disabled = true;
  showThinking();  history.push({ role: 'user', content: text });

  // Use the mode-based API (server handles system prompts via shared/translator.py)
  const chatBody= {
    messages: [{ role: 'user', content: text }],
    mode: currentMode,
    temperature: currentMode === 'translator' ? 0.3 : currentMode === 'teacher' ? 0.5 : 0.7,
    stream: true,
    n_predict: 1024,
  };

  abortController = new AbortController();

  try {
    const resp = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(chatBody),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
      hideThinking();
      addMsg(`❌ Error: ${err.error || 'Desconocido'}`, 'error');
      isGenerating = false;
      sendBtn.disabled = false;
      return;
    }

    hideThinking();

    // Create streaming message
    const streamDiv = document.createElement('div');
    streamDiv.className = 'msg assistant streaming-cursor';
    chatArea.appendChild(streamDiv);
    chatArea.scrollTop = chatArea.scrollHeight;

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullResponse = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (!data || data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const delta = parsed.choices?.[0]?.delta?.content || '';
            if (delta) {
              fullResponse += delta;
              const cleanText = fullResponse.replace(THINK_REGEX, '').trim();
              streamDiv.textContent = cleanText || '⏳';
              chatArea.scrollTop = chatArea.scrollHeight;
            }
          } catch (e) {
            // partial JSON, skip
          }
        }
      }
    }

    // Stream done
    streamDiv.classList.remove('streaming-cursor');
    const finalText = fullResponse.replace(THINK_REGEX, '').trim() || fullResponse;
    
    // Parse multi-output from the raw response
    let parsed = {};
    let ttsText = finalText;
    try {
      const parseResp = await fetch(`${API}/api/parse`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: finalText, mode: currentMode }),
      });
      if (parseResp.ok) {
        const parseData = await parseResp.json();
        parsed = parseData.parsed || {};
        ttsText = parseData.tts_text || finalText;
      }
    } catch (e) {
      console.warn('[C] Parse error:', e);
    }
    
    // If we have structured output, display styled cards
    if (parsed && parsed.text) {
      streamDiv.innerHTML = '';
      
      // TEXT card
      if (parsed.text) {
        const tc = document.createElement('div');
        tc.style.cssText = 'margin-bottom:8px';
        tc.innerHTML = '<div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">' + 
          (currentMode === 'translator' ? '🔊 Texto Original' : '🔊 Idioma Objetivo') + '</div>' +
          '<div style="font-size:16px;font-weight:600;line-height:1.5">' + escHtml(parsed.text) + '</div>';
        streamDiv.appendChild(tc);
      }
      
      // PRONUNCIATION card
      if (parsed.pronunciation && parsed.pronunciation !== 'N/A') {
        const pc = document.createElement('div');
        pc.style.cssText = 'margin-bottom:6px;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px';
        pc.innerHTML = '<div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">🔤 Pronunciación</div>' +
          '<div style="font-size:14px;font-style:italic">' + escHtml(parsed.pronunciation) + '</div>';
        streamDiv.appendChild(pc);
      }
      
      // TRANSLATION card
      if (parsed.translation) {
        const tc2 = document.createElement('div');
        tc2.style.cssText = 'margin-bottom:6px;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px';
        tc2.innerHTML = '<div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">🌍 Traducción</div>' +
          '<div style="font-size:14px">' + escHtml(parsed.translation) + '</div>';
        streamDiv.appendChild(tc2);
      }
      
      // EXPLANATION (teacher)
      if (parsed.explanation) {
        const ec = document.createElement('div');
        ec.style.cssText = 'margin-bottom:6px;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px';
        ec.innerHTML = '<div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">📖 Explicación</div>' +
          '<div style="font-size:13px">' + escHtml(parsed.explanation) + '</div>';
        streamDiv.appendChild(ec);
      }
      
      // EXERCISE (teacher)
      if (parsed.exercise) {
        const exc = document.createElement('div');
        exc.style.cssText = 'margin-top:6px;padding:6px 10px;background:rgba(250,204,21,0.08);border:1px solid rgba(250,204,21,0.2);border-radius:6px';
        exc.innerHTML = '<div style="font-size:10px;color:var(--yellow);text-transform:uppercase">💪 Ejercicio</div>' +
          '<div style="font-size:13px">' + escHtml(parsed.exercise) + '</div>';
        streamDiv.appendChild(exc);
      }
    } else {
      streamDiv.textContent = finalText;
    }
    
    history.push({ role: 'assistant', content: finalText });

    // Auto-TTS - only the TTS text (TEXT field for teacher/translator)
    if (ttsEnabled && ttsText && ttsText.length > 3 && ttsText.length < 500) {
      await playTts(ttsText, streamDiv);
    }

  } catch (e) {
    hideThinking();
    if (e.name === 'AbortError') {
      addMsg('⏹️ Generación cancelada', 'system');
    } else {
      addMsg(`❌ Error: ${e.message}`, 'error');
    }
  }

  isGenerating = false;
  sendBtn.disabled = false;
}

// ── TTS (reuses single AudioContext) ─────────────────
async function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function playTts(text, msgEl) {
  try {
    // Try streaming TTS first
    const resp = await fetch(`${API}/api/tts/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, lang: 'auto' }),
    });

    if (!resp.ok) {
      // Fallback to non-streaming
      const resp2 = await fetch(`${API}/api/tts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, lang: 'auto' }),
      });
      if (resp2.ok) {
        const blob = await resp2.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = () => URL.revokeObjectURL(url);
        await audio.play();
      }
      return;
    }

    // Streaming TTS playback via Web Audio API
    const sr = parseInt(resp.headers.get('X-Sample-Rate') || '24000');
    const engine = resp.headers.get('X-TTS-Engine') || 'piper';
    const ctx = getAudioCtx();

    // Show engine indicator
    if (msgEl) {
      const indicator = document.createElement('span');
      indicator.className = 'tts-indicator playing';
      indicator.textContent = engine === 'kokoro' ? '🎵 Kokoro' : '🔊 Piper';
      msgEl.appendChild(indicator);
    }

    const reader = resp.body.getReader();
    const chunks = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }

    // Decode all PCM chunks
    const totalLen = chunks.reduce((s, c) => s + c.length, 0);
    const pcmBuffer = new Uint8Array(totalLen);
    let offset = 0;
    for (const c of chunks) {
      pcmBuffer.set(c, offset);
      offset += c.length;
    }

    // Convert to Float32
    const int16 = new Int16Array(pcmBuffer.buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768.0;
    }

    // Play
    const buffer = ctx.createBuffer(1, float32.length, sr);
    buffer.getChannelData(0).set(float32);
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start();

  } catch (e) {
    console.warn('[C] TTS error:', e);
  }
}

// ── ASR (Chrome SpeechRecognition) ───────────────────
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'es-ES';

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    input.value = transcript;
    input.style.height = '42px';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    isRecording = false;
    micBtn.classList.remove('recording');
    send();
  };

  recognition.onerror = (event) => {
    console.warn('[C] ASR error:', event.error);
    isRecording = false;
    micBtn.classList.remove('recording');
    if (event.error !== 'aborted' && event.error !== 'no-speech') {
      addMsg(`❌ Error de micrófono: ${event.error}`, 'error');
    }
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
  };
}

micBtn.addEventListener('click', () => {
  if (isRecording) {
    if (recognition) recognition.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    return;
  }

  if (recognition) {
    isRecording = true;
    micBtn.classList.add('recording');
    try { recognition.start(); } catch (e) { console.warn(e); }
  } else {
    addMsg('❌ Micrófono no soportado en este navegador', 'error');
  }
});

// ── Stats polling ────────────────────────────────────
async function pollStats() {
  try {
    const resp = await fetch(`${API}/api/stats`);
    if (!resp.ok) throw new Error('No conectado');
    const stats = await resp.json();
    statusDot.className = 'status-dot connected';
    const llamaOk = stats.llama_connected;
    statusText.textContent = llamaOk
      ? `🟢 LLM ${stats.tokens_per_sec || '?'} tok/s · VRAM ${stats.vram_percent || '?'}%`
      : '⚠️ llama-server no conectado';
    if (!llamaOk) statusDot.className = 'status-dot disconnected';
  } catch (e) {
    statusDot.className = 'status-dot disconnected';
    statusText.textContent = '⚠️ Servidor no disponible';
  }
}
setInterval(pollStats, 2000);
pollStats();

// ── Keyboard shortcut ────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (isGenerating && abortController) {
      abortController.abort();
      addMsg('⏹️ Generación cancelada', 'system');
    }
  }
});
</script>
</body>
</html>
