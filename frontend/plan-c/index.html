<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport"content="width=device-width,initial-scale=1.0"><title>Plan C — Alex Voice (Pipeline)</title>
<link rel="preconnect"href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap"rel="stylesheet">
<style>:root{--bg:#0a1208;--surface:#0f1a0c;--surface2:#1a2e14;--border:#2a4a1e;--text:#d0f0c0;--textDim:#7aaa6a;--accent:#22c55e;--accent2:#16a34a;--glow:rgba(34,197,94,.3)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;flex-shrink:0}.logo{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--accent)}.plan-badge{font-size:9px;letter-spacing:2px;color:var(--accent);margin:4px 0 20px;padding:2px 8px;border:1px solid var(--accent);display:inline-block}.mode-group{display:flex;flex-direction:column;gap:4px;flex:1}.mode-btn{padding:8px 12px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--textDim);font-family:inherit;font-size:13px;transition:all .2s;text-align:left}.mode-btn:hover{color:var(--text);background:var(--surface2)}.mode-btn.active{color:var(--text);background:var(--surface2);border-left:2px solid var(--accent)}.pipeline{font-size:10px;padding:10px;border:1px solid var(--border);border-radius:6px;margin-top:auto}.pipeline .step{display:flex;align-items:center;gap:6px;margin:3px 0;font-family:'JetBrains Mono',monospace}.pipeline .step .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}.main{flex:1;display:flex;flex-direction:column}.header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between}.header h2{font-size:14px;font-weight:500}.messages{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px;font-size:13px}.msg{max-width:80%;padding:10px 14px;border-radius:8px;line-height:1.5;animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0}}.msg.user{align-self:flex-end;background:var(--accent2);color:#fff}.msg.assistant{align-self:flex-start;background:var(--surface2);border:1px solid var(--border)}.msg .ts{font-size:9px;color:var(--textDim);margin-top:4px;opacity:.4}.think-indicator{align-self:flex-start;display:none;gap:4px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px}.think-indicator.show{display:flex}.think-indicator span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite}.think-indicator span:nth-child(2){animation-delay:.2s}.think-indicator span:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}.input-area{padding:14px 24px;border-top:1px solid var(--border);background:var(--surface)}.input-row{display:flex;gap:8px}textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;resize:none;outline:none;min-height:44px}textarea:focus{border-color:var(--accent)}.send-btn{width:44px;height:44px;border-radius:6px;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:16px}.send-btn:hover{background:var(--accent2)}.send-btn:disabled{opacity:.3}
</style></head>
<body>
<div class="sidebar">
<div class="logo">AlexVoice</div>
<div class="plan-badge">Plan C · Pipeline</div>
<div class="mode-group"id="modeGroup">
<button class="mode-btn active"data-mode="teacher"onclick="setMode('teacher')"><strong>🎓 Teacher</strong></button>
<button class="mode-btn"data-mode="conversation"onclick="setMode('conversation')"><strong>💬 Conversación</strong></button>
<button class="mode-btn"data-mode="translator"onclick="setMode('translator')"><strong>🌍 Traductor</strong></button>
</div>
<div class="pipeline"><div class="step"><div class="dot"></div>VAD + ASR (whisper)</div><div class="step"><div class="dot"></div>LLM (Qwen3.5-2B)</div><div class="step"><div class="dot"></div>TTS (Piper/OuteTTS)</div></div>
</div>
<div class="main">
<div class="header"><h2 id="modeTitle">🎙 Plan C — Pipeline Completo</h2><span style="font-size:10px;color:var(--textDim)"id="modeBadge">Teacher Mode</span></div>
<div class="messages"id="msgs"><div class="msg assistant">Plan C: Pipeline ASR → LLM → TTS.<div class="ts">Alex Voice · Plan C</div></div></div>
<div class="think-indicator"id="think"><span></span><span></span><span></span></div>
<div class="input-area">
<div class="input-row"><textarea id="input"placeholder="Escribe o habla..."rows="1"onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea><button class="send-btn"id="sendBtn"onclick="send()">➤</button></div>
</div></div>
<script>
const MODES={teacher:{name:'🎓 Teacher',badge:'Teacher Mode',sys:'Eres un tutor experto. Responde en el idioma del usuario.'},conversation:{name:'💬 Conversación',badge:'Conversation Mode',sys:'Eres un asistente amigable. Conversación natural.'},translator:{name:'🌍 Traductor',badge:'Translator Mode',sys:'Traductor ES/EN/JA. Incluye romaji.'}};
let currentMode='teacher';
function setMode(m){currentMode=m;const c=MODES[m];document.getElementById('modeTitle').textContent='🎙 Plan C — '+c.name;document.getElementById('modeBadge').textContent=c.badge;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-mode="${m}"]`).classList.add('active')}
function addMsg(role,text){const d=document.createElement('div');d.className='msg '+role;d.textContent=text;const t=document.createElement('div');t.className='ts';t.textContent=new Date().toLocaleTimeString();d.appendChild(t);document.getElementById('msgs').appendChild(d);d.scrollIntoView({behavior:'smooth'})}
async function send(){const i=document.getElementById('input');const t=i.value.trim();if(!t)return;addMsg('user',t);i.value='';document.getElementById('think').classList.add('show');document.getElementById('sendBtn').disabled=true;try{const r=await fetch('http://localhost:8081/completion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:'<|im_start|>system\n'+MODES[currentMode].sys+'<|im_end|>\n<|im_start|>user\n'+t+'<|im_end|>\n<|im_start|>assistant\n',n_predict:256,temperature:0.7,stop:['<|im_end|>']})});const d=await r.json();addMsg('assistant',d.content||'')}catch(e){addMsg('assistant','⚠️ Error: '+e.message)}document.getElementById('think').classList.remove('show');document.getElementById('sendBtn').disabled=false}
</script>
</body>
</html>
